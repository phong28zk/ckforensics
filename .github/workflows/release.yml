name: Release

# Trigger on version tags only. Example: git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - "v*.*.*"

# Required for softprops/action-gh-release to create/upload releases.
permissions:
  contents: write

jobs:
  # ── Per-platform binary build ─────────────────────────────────────────────
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false   # build all platforms even if one fails
      matrix:
        include:
          - label:      linux-x64
            runner:     ubuntu-latest
            bun_target: bun-linux-x64
            outfile:    ckforensics-linux-x64

          - label:      linux-arm64
            runner:     ubuntu-latest
            bun_target: bun-linux-arm64
            outfile:    ckforensics-linux-arm64

          - label:      darwin-x64
            runner:     macos-13          # Intel runner
            bun_target: bun-darwin-x64
            outfile:    ckforensics-darwin-x64

          - label:      darwin-arm64
            runner:     macos-14          # Apple Silicon runner
            bun_target: bun-darwin-arm64
            outfile:    ckforensics-darwin-arm64

          - label:      windows-x64
            runner:     windows-latest
            bun_target: bun-windows-x64
            outfile:    ckforensics-win-x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test
        env:
          # Prevent postinstall from running during CI (source repo, but be explicit)
          CKFORENSICS_SKIP_DOWNLOAD: "1"

      - name: Compile binary
        run: |
          mkdir -p dist
          bun build \
            --compile \
            --target=${{ matrix.bun_target }} \
            src/cli/index.ts \
            --outfile dist/${{ matrix.outfile }}
        shell: bash

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.label }}
          path: dist/${{ matrix.outfile }}
          if-no-files-found: error
          retention-days: 1

  # ── Collect artifacts, generate checksums, publish release ───────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for release notes)
        uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          # Download every artifact that starts with "binary-" into dist/
          pattern: binary-*
          path: dist
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lh dist/

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt
        shell: bash

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # tag_name is implicitly ${{ github.ref_name }} (e.g. v0.1.0)
          generate_release_notes: true
          files: |
            dist/ckforensics-linux-x64
            dist/ckforensics-linux-arm64
            dist/ckforensics-darwin-x64
            dist/ckforensics-darwin-arm64
            dist/ckforensics-win-x64.exe
            dist/checksums.txt
          fail_on_unmatched_files: true
